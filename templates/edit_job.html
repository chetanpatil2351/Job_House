<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Job | Job House</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="page-header">

    <a href="/dashboard" class="dashboard-btn">

        <i class="bi bi-arrow-left"></i>

        Dashboard

    </a>

</div>

<div class="register-wrapper">

    <div class="register-card">

        <h2>Edit Job</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}

        <div class="alert alert-{{ category }} alert-dismissible fade show">

            {{ message }}

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
            </button>

        </div>

        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">

                <input
                    type="text"
                    class="form-control"
                    name="company_name"
                    value="{{ job['company_name'] }}"
                    required>

            </div>

            <div class="mb-3">

                <input
                    type="text"
                    class="form-control"
                    name="job_title"
                    value="{{ job['job_title'] }}"
                    required>

            </div>

            <div class="mb-3">

                <input
                    type="text"
                    class="form-control"
                    name="location"
                    value="{{ job['location'] }}"
                    required>

            </div>

            <div class="mb-3">

                <select
                    class="form-select"
                    name="job_type"
                    required>

                    <option value="Full Time"
                    {% if job["job_type"]=="Full Time" %}selected{% endif %}>
                    Full Time
                    </option>

                    <option value="Part Time"
                    {% if job["job_type"]=="Part Time" %}selected{% endif %}>
                    Part Time
                    </option>

                    <option value="Internship"
                    {% if job["job_type"]=="Internship" %}selected{% endif %}>
                    Internship
                    </option>

                    <option value="Remote"
                    {% if job["job_type"]=="Remote" %}selected{% endif %}>
                    Remote
                    </option>

                    <option value="Hybrid"
                    {% if job["job_type"]=="Hybrid" %}selected{% endif %}>
                    Hybrid
                    </option>

                    <option value="Contract"
                    {% if job["job_type"]=="Contract" %}selected{% endif %}>
                    Contract
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <input
                    type="text"
                    class="form-control"
                    name="salary"
                    value="{{ job['salary'] }}"
                    required>

            </div>

            <div class="mb-4">

                <textarea
                    class="form-control"
                    rows="5"
                    name="description"
                    required>{{ job["description"] }}</textarea>

            </div>

            <button class="btn btn-primary w-100">

                Update Job

            </button>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
setTimeout(function(){

    let alerts=document.querySelectorAll(".alert");

    alerts.forEach(function(alert){

        alert.style.transition="opacity .5s";
        alert.style.opacity="0";

        setTimeout(function(){

            alert.remove();

        },500);

    });

},3000);
</script>

</body>
</html>
